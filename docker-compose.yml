version: "3.8"

services:

  zookeeper:

    image: confluentinc/cp-zookeeper:7.5.0

    container_name: zookeeper

    environment:

      ZOOKEEPER_CLIENT_PORT: 2181

    ports:

      - "2181:2181"

  kafka:

    image: confluentinc/cp-kafka:7.5.0

    container_name: kafka

    depends_on:

      - zookeeper

    ports:

      - "9092:9092"

    environment:

      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT:
        zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS:
        PLAINTEXT://kafka:9092

      KAFKA_LISTENERS:
        PLAINTEXT://0.0.0.0:9092

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1



  redis:

    image: redis:7

    container_name: redis

    ports:

      - "6379:6379"



  postgres:

    image: postgres:15

    container_name: postgres

    environment:

      POSTGRES_USER: soc_user

      POSTGRES_PASSWORD: soc_password

      POSTGRES_DB: soc_db

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data



  producer:

    build: ./producer

    container_name: producer

    depends_on:

      - kafka

    environment:

      KAFKA_BROKER: kafka:9092

      ENTRY_FILE: test.js

    restart: always



  detection-agent:

    build: ./detection-agent

    container_name: detection-agent

    depends_on:

      - kafka
      - redis

    environment:

      KAFKA_BROKER: kafka:9092

      REDIS_HOST: redis

    restart: always



  dashboard-service:

    build: ./dashboard-service

    container_name: dashboard-service

    depends_on:

      - kafka
      - postgres

    environment:

      KAFKA_BROKER: kafka:9092
      
      POSTGRES_HOST: postgres

      POSTGRES_USER: soc_user

      POSTGRES_PASSWORD: soc_password

      POSTGRES_DB: soc_db

    ports:

      - "3000:3000"

    restart: always


volumes:

  postgres_data:
